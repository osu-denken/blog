<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {%- seo -%}
  <meta name="color-scheme" content="light dark">
  <script>
    // 描画前にテーマを確定させてちらつきを防ぐ
    (function () {
      var saved = null;
      try { saved = localStorage.getItem('theme'); } catch (e) {}
      var theme = (saved === 'light' || saved === 'dark') ? saved
        : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  <link rel="stylesheet" href="{{ "/assets/css/main-override.css" | relative_url }}">
  <link rel="stylesheet" href="{{ "/assets/css/navbar.css" | relative_url }}">
  <link rel="stylesheet" href="{{ "/assets/css/theme.css" | relative_url }}">
  {%- feed_meta -%}
  {%- if jekyll.environment == 'production' and site.google_analytics -%}
    {%- include google-analytics.html -%}
  {%- endif -%}
  <script src="https://cdn.jsdelivr.net/npm/iconify-icon@3/dist/iconify-icon.min.js"></script>
  <script src="{{ "/assets/js/main.js" | relative_url }}"></script>
</head>
